# Apache reverse-proxy vhost for spendscope.hostsrg.com -> uvicorn on 127.0.0.1:8077.
# Requires: a2enmod proxy proxy_http headers ssl
# TLS is issued by certbot (Let's Encrypt); run certbot --apache after the HTTP vhost is live.

<VirtualHost *:80>
    ServerName spendscope.hostsrg.com
    # Let certbot manage the redirect to HTTPS after issuing the certificate.
    RewriteEngine On
    RewriteCond %{HTTPS} off
    RewriteRule ^/?(.*) https://%{SERVER_NAME}/$1 [R=301,L]
</VirtualHost>

<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName spendscope.hostsrg.com

    ProxyPreserveHost On
    ProxyRequests Off

    # Upload headroom for base64 statements/receipts.
    LimitRequestBody 26214400

    ProxyPass        /  http://127.0.0.1:8077/  timeout=120
    ProxyPassReverse /  http://127.0.0.1:8077/

    RequestHeader set X-Forwarded-Proto "https"

    # SSLCertificateFile / SSLCertificateKeyFile are filled in by certbot.
    SSLEngine on

    ErrorLog  ${APACHE_LOG_DIR}/spendscope_error.log
    CustomLog ${APACHE_LOG_DIR}/spendscope_access.log combined
</VirtualHost>
</IfModule>

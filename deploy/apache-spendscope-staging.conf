# Apache reverse-proxy vhost for staging.spendscope.hostsrg.com -> uvicorn on 127.0.0.1:8078.
# Requires a DNS A record for staging.spendscope.hostsrg.com -> the VPS IP, then:
#   sudo a2ensite apache-spendscope-staging && sudo apache2ctl configtest && sudo systemctl reload apache2
#   sudo certbot --apache -d staging.spendscope.hostsrg.com

<VirtualHost *:80>
    ServerName staging.spendscope.hostsrg.com
    RewriteEngine On
    RewriteCond %{HTTPS} off
    RewriteRule ^/?(.*) https://%{SERVER_NAME}/$1 [R=301,L]
</VirtualHost>

<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName staging.spendscope.hostsrg.com

    ProxyPreserveHost On
    ProxyRequests Off
    LimitRequestBody 26214400

    ProxyPass        /  http://127.0.0.1:8078/  timeout=120
    ProxyPassReverse /  http://127.0.0.1:8078/
    RequestHeader set X-Forwarded-Proto "https"

    SSLEngine on

    ErrorLog  ${APACHE_LOG_DIR}/spendscope_staging_error.log
    CustomLog ${APACHE_LOG_DIR}/spendscope_staging_access.log combined
</VirtualHost>
</IfModule>
